<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📘</text></svg>">
        <title>options</title>
        <style>
            body{
                margin: 0px;
                padding-top: 85vh;
                background:black;
                height: 15vh;
            }
            #bk{
                position:absolute ;
                top: 0;
                left: 50%;
                transform: translate(-50.05%);
                height: 100vh;      
                z-index: -1;  
                overflow: hidden;
            }
            video{
                height: 100%;
                width: auto;
            }
            .filler{
                position: fixed;
                top: 50%;
                right: 50%;
                transform: translate(50%,-50%);
                backdrop-filter: blur(10px);  
                border: none;
                box-shadow: 0 0 8px gray;
                border-radius: 10px;
                height: 70vh;
                width: 40vw;
                display: flex;
                flex-direction: column;
            }
            .mini-title{
                color: rgb(86, 60, 3);
                padding-top: 2.5vh;
                text-align: center;
                width: 100%;
                height: fit-content;
                font-family: "Pacifico" , cursive;
                font-size: 3.5vw;
                text-shadow: 0 0 6px gray;
            }
            .subject-level{
                color:rgb(74, 74, 74) ;
                padding-left: 1.5vw;
                padding-right: 1.5vw;
                font-size: 2.5vw;
                display: flex;
                justify-content: space-between;
            }
            .sub-container{
                display: grid;
                grid-template-rows: repeat(3,1fr);
                align-items: top;
                height: 100%;
            }
            input[type="radio"]{
                outline: none;
        
                border: none;
                width:2vw ;
                height: 2vw;
                /* appearance: none;   */
                border: 1px solid gray;
                border-radius:1vw ;
                background-color: transparent;
            }
            .input-container{
                display: flex;
                align-items:top ;
                gap: 2.85vw;
            }
            .subject-input-details-container{
                color: brown;
                display: flex;
                justify-content: space-between;
                font-size: 1.75vw;
                padding-left: 1.5vw;
                padding-right: 0.275vw;
            }
            .subject-input-details{
                display: flex;
                gap: 1.15vw;
            }
            @media (max-width: 1500px) { 
            .subject-input-details{
                display: flex;
                gap: 1.25vw;
            }}
            @media (max-width: 1350px) { 
            .subject-input-details{
                display: flex;
                gap: 1.35vw;
            }}
            @media (max-width: 1175px) { 
            .subject-input-details{
                display: flex;
                gap: 1.45vw;
            }}
            @media (max-width: 1000px) { 
            .subject-input-details{
                display: flex;
                gap: 1.65vw;
            }}
            @media (max-width: 850px) { 
            .subject-input-details{
                display: flex;
                gap: 1.85vw;
            }}
            @media (max-width: 675px) { 
            .subject-input-details{
                display: flex;
                gap: 2vw;
            }}
            @media (max-width: 615px) { 
            .subject-input-details{
                display: flex;
                gap: 2.25vw;
            }}
            @media (max-width: 525px) { 
            .subject-input-details{
                display: flex;
                gap: 2.55vw;
            }}
            .next-back-page-buttons-container{
                width: 100%;
                display: grid;
                height: 15vh;
                grid-template-columns: repeat(3,1fr);
                align-items: center;
            }
            .next-back-page-buttons-container>:first-child{
                justify-self: end;
            }
            .next-back-page-buttons-container>:last-child{
                justify-self: start;
            }
            button{
                width: 12.5vw;
                height: 7.5vh;
                border-radius: 500px;
                border: none;
                backdrop-filter: blur(10px);  
                border: none;
                box-shadow: 0 0 8px gray;
                background-color: transparent;
                transition: 0.25s;
                color: red;
                font-size: 1.85vw;
                font-family: "Playwrite España", cursive;
                padding-bottom: 5px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            button:hover{
                scale: 1.25;
                transition: 0.25s;
            }
            img{
                height: 100%;
                width : auto;
                backdrop-filter: blur(10px);
                background-color: transparent;

            }
        </style>
    </head>


    <body>
        <div  id="bk"><video autoplay  loop ><source  src="bk.mp4" type="video/mp4"></video></div>
        <audio autoplay  loop id="myAudio">
            <source src="bk.mp3" type="audio/mp3">
        </audio>
        <div class="filler"> </div>
        <div id="buttons-container"></div>
        <script src="options.js" ></script>
        <script>
            let globalInfo = {currentPage:0} ;
            let studentLvl = {Math : null , Physic : null  , Svt : null , Arabe : null , France : null , Eng : null , Philo : null , Info : null , Option : null}
            const pagesSubjects = [['Math','Physic' ,'Svt'],['Arabe','France' , 'Eng'],['Philo','Info' ,'Option']] ;
            generatePage(...pagesSubjects[globalInfo.currentPage],0)

        </script>
    </body>
</html>
